# Netlify Configuration for Vite + React SPA Portfolio Deployment

[build]
  # The command to build the production bundle
  command = "npm run build"
  
  # The directory containing the static files to publish
  publish = "dist"

# SPA Redirect Rule: Redirect all paths to index.html for React Router to handle
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# High-Performance Caching & Security Headers
[[headers]]
  for = "/*"
  [headers.values]
    # Prevent browsers from MIME-sniffing the response away from the declared content-type
    X-Content-Type-Options = "nosniff"
    
    # Protect against clickjacking attacks
    X-Frame-Options = "DENY"
    
    # Enable browser Cross-Site Scripting (XSS) filters
    X-XSS-Protection = "1; mode=block"
    
    # Strict Transport Security (HSTS) - force HTTPS connections
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    
    # Control how much referrer information is sent with requests
    Referrer-Policy = "no-referrer-when-downgrade"

# Aggressive caching for hashed production assets generated by Vite
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
